<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Foto & Video</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== BODY & CONTAINER ===== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* ===== FILTER BUTTONS ===== */
        .filter-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            animation: fadeIn 1.2s ease;
        }

        .filter-btn {
            padding: 12px 30px;
            border: none;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .filter-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            background: #667eea;
            color: white;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            transform: scale(1.1);
        }

        /* ===== GALLERY ===== */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        /* ===== GALLERY ITEMS ===== */
        .gallery-item {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            opacity: 0;
            transform: scale(0.8) translateY(30px);
            animation: itemFadeIn 0.6s ease forwards;
        }

        .gallery-item:nth-child(1) { animation-delay: 0.1s; }
        .gallery-item:nth-child(2) { animation-delay: 0.2s; }
        .gallery-item:nth-child(3) { animation-delay: 0.3s; }
        .gallery-item:nth-child(4) { animation-delay: 0.4s; }
        .gallery-item:nth-child(5) { animation-delay: 0.5s; }
        .gallery-item:nth-child(6) { animation-delay: 0.6s; }
        .gallery-item:nth-child(n+7) { animation-delay: 0.7s; }

        .gallery-item:hover {
            transform: translateY(-10px) scale(1.05) rotate(2deg);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .gallery-item.hide {
            animation: itemFadeOut 0.4s ease forwards;
        }

        .gallery-item img,
        .gallery-item video {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img,
        .gallery-item:hover video {
            transform: scale(1.1);
        }

        /* ===== ITEM INFO ===== */
        .item-info {
            padding: 15px;
            background: linear-gradient(to bottom, white, #f8f9fa);
        }

        .item-title {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .item-category {
            display: inline-block;
            padding: 5px 15px;
            background: #667eea;
            color: white;
            border-radius: 15px;
            font-size: 0.85em;
            animation: pulse 2s infinite;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes itemFadeIn {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes itemFadeOut {
            to {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(102, 126, 234, 0);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Galeri Foto & Video 📸</h1>
            <p>Kumpulan konten menarik untuk Anda</p>
        </header>

        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">Semua</button>
            <button class="filter-btn" data-filter="VideoNganu">VideoNganu</button>
            <button class="filter-btn" data-filter="Cosplayer">Cosplayer</button>
        </div>

        <div class="gallery" id="gallery">
            <!-- Video Items -->
            <div class="gallery-item" data-category="VideoNganu">
                <video controls>
                    <source src="video1.mp4" type="video/mp4">
                    Browser Anda tidak mendukung tag video.
                </video>
                <div class="item-info">
                    <div class="item-title">Video Nganu 1</div>
                    <span class="item-category">VideoNganu</span>
                </div>
            </div>

            <div class="gallery-item" data-category="VideoNganu">
                <video controls>
                    <source src="video2.mp4" type="video/mp4">
                    Browser Anda tidak mendukung tag video.
                </video>
                <div class="item-info">
                    <div class="item-title">Video Nganu 2</div>
                    <span class="item-category">VideoNganu</span>
                </div>
            </div>

            <!-- Cosplayer Photos -->
            <div class="gallery-item" data-category="Cosplayer">
                <img src="cosplay1.jpg" alt="Cosplayer 1">
                <div class="item-info">
                    <div class="item-title">Cosplayer 1</div>
                    <span class="item-category">Cosplayer</span>
                </div>
            </div>

            <div class="gallery-item" data-category="Cosplayer">
                <img src="cosplay2.jpg" alt="Cosplayer 2">
                <div class="item-info">
                    <div class="item-title">Cosplayer 2</div>
                    <span class="item-category">Cosplayer</span>
                </div>
            </div>

            <div class="gallery-item" data-category="Cosplayer">
                <img src="cosplay3.jpg" alt="Cosplayer 3">
                <div class="item-info">
                    <div class="item-title">Cosplayer 3</div>
                    <span class="item-category">Cosplayer</span>
                </div>
            </div>

            <div class="gallery-item" data-category="Cosplayer">
                <img src="cosplay4.jpg" alt="Cosplayer 4">
                <div class="item-info">
                    <div class="item-title">Cosplayer 4</div>
                    <span class="item-category">Cosplayer</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Filter functionality dengan animasi
        const filterBtns = document.querySelectorAll('.filter-btn');
        const galleryItems = document.querySelectorAll('.gallery-item');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Update active button
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filterValue = btn.getAttribute('data-filter');

                galleryItems.forEach((item, index) => {
                    // Reset animation
                    item.style.animation = 'none';
                    
                    if (filterValue === 'all' || item.getAttribute('data-category') === filterValue) {
                        item.classList.remove('hide');
                        // Re-trigger animation dengan delay
                        setTimeout(() => {
                            item.style.animation = `itemFadeIn 0.6s ease forwards ${index * 0.1}s`;
                        }, 10);
                    } else {
                        item.classList.add('hide');
                    }
                });
            });
        });

        // Parallax effect on scroll
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const header = document.querySelector('header');
            header.style.transform = `translateY(${scrolled * 0.5}px)`;
            header.style.opacity = 1 - (scrolled / 500);
        });
    </script>
</body>
</html>
